<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <!-- Element Plus -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #303133;
            min-height: 100vh;
        }
        
        .layout-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* 左侧导航栏 */
        .sidebar {
            width: 210px;
            background: #001529;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-logo h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sidebar-logo .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #1890ff, #36cfc9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        
        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .menu-group {
            margin-bottom: 4px;
        }
        
        .menu-group-title {
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            padding: 8px 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .menu-item {
            padding: 12px 24px;
            color: rgba(255, 255, 255, 0.65);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .menu-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .menu-item.active {
            color: #fff;
            background: #1890ff;
        }
        
        .menu-item .icon {
            font-size: 16px;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* 顶部导航 */
        .top-header {
            height: 56px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            z-index: 10;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #909399;
        }
        
        .breadcrumb a {
            color: #909399;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            color: #1890ff;
        }
        
        .breadcrumb .current {
            color: #303133;
        }
        
        .breadcrumb .separator {
            color: #dcdfe6;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #606266;
            font-size: 14px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            background: #1890ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }
        
        /* 内容区域 */
        .content-area {
            flex: 1;
            padding: 16px 24px;
            overflow-y: auto;
        }
        
        /* 筛选区域 */
        .filter-card {
            background: #fff;
            border-radius: 4px;
            padding: 16px 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .filter-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 12px;
            align-items: flex-end;
            overflow-x: auto;
        }
        
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .filter-label {
            font-size: 13px;
            color: #606266;
            font-weight: 500;
        }
        
        .filter-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        /* 表格区域 */
        .table-card {
            background: #fff;
            border-radius: 4px;
            padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .table-title {
            font-size: 15px;
            font-weight: 600;
            color: #303133;
        }
        
        /* 表格样式 */
        .el-table {
            font-size: 13px;
        }
        
        .el-table th.el-table__cell {
            background-color: #fafafa !important;
            font-weight: 600;
            color: #303133;
            font-size: 13px;
        }
        
        .el-table .cell {
            padding: 6px 8px;
            white-space: nowrap;
        }
        
        .el-table td.el-table__cell {
            padding: 8px 0;
        }
        
        /* 排序图标与列名同行：确保表头cell不换行 */
        .el-table .el-table__header-wrapper .cell {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }
        
        /* 数值列右对齐 */
        .text-right .cell {
            text-align: right;
            justify-content: flex-end;
        }
        
        /* 可信度颜色 */
        .confidence-high {
            color: #52c41a;
            font-weight: 600;
        }
        
        .confidence-medium {
            color: #faad14;
            font-weight: 600;
        }
        
        /* 评分状态标签 */
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .status-tag-pending {
            background-color: #FEF0F0;
            color: #F56C6C;
        }
        
        .status-tag-scored {
            background-color: #f0f9eb;
            color: #67C23A;
        }
        
        /* 操作链接 */
        .action-link {
            color: #1890ff;
            cursor: pointer;
        }
        
        .action-link:hover {
            color: #40a9ff;
        }
        
        /* 分页 */
        .pagination-wrapper {
            display: flex;
            justify-content: flex-end;
            padding: 16px 0 4px 0;
        }
        
        /* Element Plus 组件样式调整 */
        .el-select .el-input__wrapper {
            min-height: 32px;
        }
        
        .el-date-editor.el-input {
            width: 140px;
        }
        
        .el-input__wrapper {
            min-height: 32px;
        }
        
        .el-button {
            height: 32px;
            padding: 0 15px;
        }
        
        /* 响应式 */
        @media screen and (max-width: 1600px) {
            .filter-row {

</head>
